name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  # Backend lint and test
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: p2p_gaming_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database schema
        run: psql -f src/db/schema.sql
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: p2p_gaming_test
          PGUSER: test_user
          PGPASSWORD: test_password

      - name: Start server (smoke test)
        run: |
          timeout 15 node src/index.js &
          sleep 5
          curl -f http://localhost:3000/health || exit 1
        env:
          PORT: 3000
          DATABASE_URL: ******localhost:5432/p2p_gaming_test
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          NODE_ENV: test

  # Admin Panel build
  admin-panel:
    name: Admin Panel CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin-panel

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          CI: true
          REACT_APP_API_URL: http://localhost:3000

  # Docker build verification
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, admin-panel]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t p2p-gaming-backend ./backend

      - name: Build admin-panel image
        run: docker build -t p2p-gaming-admin ./admin-panel
